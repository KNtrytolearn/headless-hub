name: Build
on:
  push:
  branches: [main]
  workflow_dispatch:
jobs:
  build:
  runs-on: ubuntu-latest
  strategy:
  matrix:
  rid: [linux-arm64, linux-x64, win-x64, osx-arm64]
  steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-dotnet@v4
  with:
  dotnet-version: 8.0.x
  - name: Publish
  run: dotnet publish HeadlessHub.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o ./out
  - name: Pack
  run: |
  cd out
  if [ "${{ matrix.rid }}" = "win-x64" ]; then
  7z a ../headless-hub-${{ matrix.rid }}.zip .
  else
  tar -czf ../headless-hub-${{ matrix.rid }}.tar.gz .
  fi
  - uses: actions/upload-artifact@v4
  with:
  name: headless-hub-${{ matrix.rid }}
  path: headless-hub-${{ matrix.rid }}.*
